# ====================================================
# LawEZY Backend - PRODUCTION Profile (Render / Cloud)
# Activate: SPRING_PROFILES_ACTIVE=prod on Render
# All values come from Render environment variables
# ====================================================

server:
  port: ${SERVER_PORT:10000}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      max-lifetime: 120000
      connection-timeout: 30000
      idle-timeout: 60000

  jpa:
    show-sql: false

  data:
    mongodb:
      uri: ${MONGO_URI}

  ai:
    google:
      gemini:
        api-key: ${GOOGLE_AI_API_KEY}
        model: gemini-1.5-pro
        python-url: ${PYTHON_SERVICE_URL}

  gmail:
    client-id: ${GMAIL_CLIENT_ID}
    client-secret: ${GMAIL_CLIENT_SECRET}
    refresh-token: ${GMAIL_REFRESH_TOKEN}
    user-email: ${GMAIL_USER_EMAIL}

jwt:
  secret: ${JWT_SECRET}
  expirationMs: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
  messenger:
    url: ${MESSENGER_URL:http://127.0.0.1:8081}
  internal:
    secret: ${INTERNAL_SECRET}
  seed:
    enabled: ${APP_SEED_ENABLED:true}

supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_KEY}
  bucket: ${SUPABASE_BUCKET:legal-docs}

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID}
    secret: ${RAZORPAY_KEY_SECRET}

logging:
  level:
    com.LawEZY: INFO
    org.hibernate.SQL: WARN
