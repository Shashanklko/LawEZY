# ====================================================
# LawEZY Backend - Common Configuration
# Profile-specific settings in application-{profile}.yml
# ====================================================

server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: LawEZY-Backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Database Driver (shared)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate (shared)
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  # Gmail API namespace bridge (maps env vars to spring.gmail.* for @Value)
  gmail:
    client-id: ${GMAIL_CLIENT_ID:not-configured}
    client-secret: ${GMAIL_CLIENT_SECRET:not-configured}
    refresh-token: ${GMAIL_REFRESH_TOKEN:not-configured}
    user-email: ${GMAIL_USER_EMAIL:lawezy2025@gmail.com}

# Security Governance
jwt:
  secret: ${JWT_SECRET:dev-secret-key-not-for-production}
  expirationMs: ${JWT_EXPIRATION_MS:86400000}

# Infrastructure & Connectivity
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
  messenger:
    url: ${MESSENGER_URL:http://127.0.0.1:8081}
  internal:
    secret: ${INTERNAL_SECRET:dev-internal-secret}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
    admin-password: ${ADMIN_SEED_PASS:AdminDev123}
    expert-password: ${EXPERT_SEED_PASS:ExpertDev123}
    client-password: ${CLIENT_SEED_PASS:ClientDev123}

# Supabase Storage
supabase:
  url: ${SUPABASE_URL:https://placeholder.supabase.co}
  key: ${SUPABASE_KEY:placeholder-key}
  bucket: ${SUPABASE_BUCKET:legal-docs}

# Razorpay Payments
razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:placeholder}
    secret: ${RAZORPAY_KEY_SECRET:placeholder}
