<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0a0a0a; color: #ffffff; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background-color: #111111; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .header { background: #1e1e1e; padding: 30px; text-align: center; border-bottom: 2px solid #fbbf24; }
        .header h1 { color: #fbbf24; margin: 0; font-size: 20px; letter-spacing: 1px; }
        .content { padding: 40px; text-align: center; }
        .payout-card { background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%); border-radius: 16px; padding: 30px; margin: 20px 0; color: white; border: 1px solid #333; }
        .amount { font-size: 36px; font-weight: 800; margin-bottom: 5px; color: #fbbf24; }
        .label { font-size: 12px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .details { margin-top: 20px; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #444; }
        .btn-action { display: inline-block; padding: 12px 24px; background: #fbbf24; color: #000; text-decoration: none; border-radius: 6px; font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PAYOUT SUMMARY</h1>
        </div>
        <div class="content">
            <p th:text="${greeting}">Hello, here is your pending payout summary.</p>
            
            <div class="payout-card">
                <div class="label">Pending Amount</div>
                <div class="amount" th:text="${amount}">₹1,000.00</div>
                <div class="details">
                    <div class="detail-row">
                        <span>Status</span>
                        <span style="color: #fbbf24;">PENDING</span>
                    </div>
                    <div class="detail-row">
                        <span>Period</span>
                        <span th:text="${period}">Current Settlement Cycle</span>
                    </div>
                </div>
            </div>

            <p style="font-size: 14px; color: #888;">This is a summary of your earnings that are scheduled for the next payout cycle. No action is required from your side.</p>
        </div>
        <div class="footer">
            &copy; 2026 LawEZY Institutional Platform.
        </div>
    </div>
</body>
</html>
