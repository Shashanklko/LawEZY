<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0a0a0a; color: #ffffff; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background-color: #111111; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .header { background: #064e3b; padding: 30px; text-align: center; border-bottom: 2px solid #10b981; }
        .header h1 { color: #10b981; margin: 0; font-size: 20px; letter-spacing: 1px; }
        .content { padding: 40px; text-align: center; }
        .payout-card { background: linear-gradient(135deg, #064e3b 0%, #065f46 100%); border-radius: 16px; padding: 30px; margin: 20px 0; color: white; }
        .amount { font-size: 36px; font-weight: 800; margin-bottom: 5px; }
        .label { font-size: 12px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .details { margin-top: 20px; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PAYMENT RELEASED</h1>
        </div>
        <div class="content">
            <p th:text="${greeting}">Hello Advocate Aryan, your consultation payout has been released to your wallet.</p>
            
            <div class="payout-card">
                <div class="label">Amount Credited</div>
                <div class="amount" th:text="${amount}">₹1,000.00</div>
                <div class="details">
                    <div class="detail-row">
                        <span>Ref ID</span>
                        <span th:text="${refId}">PAY-98765</span>
                    </div>
                    <div class="detail-row">
                        <span>Session Type</span>
                        <span th:text="${sessionType}">Appointment</span>
                    </div>
                </div>
            </div>

            <p style="font-size: 14px; color: #888;">Funds are now available for withdrawal in your professional dashboard.</p>
        </div>
        <div class="footer">
            &copy; 2026 LawEZY Institutional Platform.
        </div>
    </div>
</body>
</html>
