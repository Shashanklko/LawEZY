<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0a0a0a; color: #ffffff; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background-color: #111111; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #7F1D1D 0%, #8B5A2B 100%); padding: 30px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 24px; letter-spacing: 2px; }
        .content { padding: 40px; line-height: 1.6; }
        .field { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .label { color: #8B5A2B; font-weight: bold; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; }
        .value { color: #eeeeee; font-size: 16px; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #666; background-color: #0a0a0a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NEW INQUIRY</h1>
        </div>
        <div class="content">
            <div class="field">
                <div class="label">From</div>
                <div class="value" th:text="${name}">John Doe</div>
            </div>
            <div class="field">
                <div class="label">Email</div>
                <div class="value" th:text="${email}">john@example.com</div>
            </div>
            <div class="field">
                <div class="label">Role</div>
                <div class="value" th:text="${role}">Seeker</div>
            </div>
            <div class="field">
                <div class="label">Message</div>
                <div class="value" style="white-space: pre-wrap;" th:text="${message}">Hello, I need help...</div>
            </div>
        </div>
        <div class="footer">
            &copy; 2026 LawEZY Institutional Platform. All rights reserved.
        </div>
    </div>
</body>
</html>
