[supervisord]
nodaemon=true
user=root

[program:backend]
command=java -Xmx384m -Djava.security.egd=file:/dev/./urandom -Dspring.datasource.url="${TIDB_URL:jdbc:mysql://gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/lawezy?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}" -Dspring.datasource.username="${TIDB_USER:2kwpxkd5yC95e7H.root}" -Dspring.datasource.password="${TIDB_PASSWORD:OhoXmvQCMLN1k4vR}" -jar /app/backend/app.jar --server.port=8082 --server.address=0.0.0.0
