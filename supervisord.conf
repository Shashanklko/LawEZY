[supervisord]
nodaemon=true
user=root

[program:backend]
command=java -Xmx384m -Djava.security.egd=file:/dev/./urandom -Dspring.datasource.url="${TIDB_URL}" -Dspring.datasource.username="${TIDB_USER}" -Dspring.datasource.password="${TIDB_PASSWORD}" -Dspring.data.mongodb.uri="${MONGO_URI}" -Dspring.gmail.client-id="${GMAIL_CLIENT_ID}" -Dspring.gmail.client-secret="${GMAIL_CLIENT_SECRET}" -Dspring.gmail.refresh-token="${GMAIL_REFRESH_TOKEN}" -Dspring.gmail.user-email="${GMAIL_USER_EMAIL}" -Djwt.secret="${JWT_SECRET}" -Djwt.expirationMs="${JWT_EXPIRATION_MS}" -Drazorpay.key.id="${RAZORPAY_KEY_ID}" -Drazorpay.key.secret="${RAZORPAY_KEY_SECRET}" -Dspring.ai.google.gemini.api-key="${GOOGLE_AI_API_KEY}" -jar /app/backend/app.jar --server.port=8082 --server.address=0.0.0.0
directory=/app/backend
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:messenger]
command=node /app/messenger/server.js
directory=/app/messenger
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
