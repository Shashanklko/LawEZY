<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="heritage-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7F1D1D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#450A0A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Circle for modern app feel (Optional, but looks premium) -->
  <circle cx="50" cy="50" r="48" fill="white" stroke="#7F1D1D" stroke-width="0.5"/>
  
  <!-- Institutional 'L' -->
  <text x="50" y="65" text-anchor="middle" font-family="'Spectral', serif" font-weight="800" font-size="65" fill="url(#heritage-gradient)">L</text>
  
  <!-- The Signature Dot -->
  <circle cx="72" cy="62" r="6" fill="#D4AF37"/>
</svg>
